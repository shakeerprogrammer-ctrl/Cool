<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Men's Outfit Finder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f1115;
  color:white;
  text-align:center;
}

h1{margin:20px 0;}

.container{
  max-width:480px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.option{
  position:relative;
  overflow:hidden;
  border-radius:12px;
  cursor:pointer;
  animation:fadeIn 0.6s ease;
}

.option img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:12px;
  transition:0.4s;
}

.option span{
  position:absolute;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.6);
  padding:8px;
}

.option.selected img{
  transform:scale(1.2);
}

.hidden{display:none;}

#loading{
  font-size:20px;
  animation:pulse 1.5s infinite;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.gallery img{
  width:100%;
  border-radius:10px;
  cursor:pointer;
}

#fullView{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

#fullView img{
  width:90%;
  max-width:500px;
  border-radius:12px;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes pulse{
  0%{opacity:0.3;}
  50%{opacity:1;}
  100%{opacity:0.3;}
}
</style>
</head>

<body>

<div class="container">
<h1>MEN'S OUTFIT FINDER</h1>

<!-- STEP 1 -->
<div id="step1">
<h2>Select Climate</h2>
<div class="grid">
  <div class="option" onclick="selectClimate('summer',this)">
    <img src="summer.jpg"><span>Summer</span>
  </div>
  <div class="option" onclick="selectClimate('winter',this)">
    <img src="winter.jpg"><span>Winter</span>
  </div>
  <div class="option" onclick="selectClimate('rainy',this)">
    <img src="rainy.jpg"><span>Rainy</span>
  </div>
</div>
</div>

<!-- STEP 2 -->
<div id="step2" class="hidden">
<h2>Select Occasion</h2>
<div class="grid">
  <div class="option" onclick="selectOccasion('date',this)">
    <img src="date.jpg"><span>Date</span>
  </div>
  <div class="option" onclick="selectOccasion('casual',this)">
    <img src="casual.jpg"><span>Casual</span>
  </div>
  <div class="option" onclick="selectOccasion('formal',this)">
    <img src="formal.jpg"><span>Formal</span>
  </div>
</div>
</div>

<!-- STEP 3 -->
<div id="step3" class="hidden">
<h2>Select Place</h2>
<div class="grid">
  <div class="option" onclick="selectPlace('coffee',this)">
    <img src="coffee.jpg"><span>Coffee Shop</span>
  </div>
  <div class="option" onclick="selectPlace('office',this)">
    <img src="office.jpg"><span>Office</span>
  </div>
  <div class="option" onclick="selectPlace('college',this)">
    <img src="college.jpg"><span>College</span>
  </div>
</div>
</div>

<!-- LOADING -->
<div id="loadingScreen" class="hidden">
<p id="loading">Your style is loading…<br>Be classy with your outfit ✨</p>
</div>

<!-- GALLERY -->
<div id="gallery" class="gallery"></div>

</div>

<!-- FULL VIEW -->
<div id="fullView" onclick="closeFullView()">
<img id="fullImage">
</div>

<script>
let climate="", occasion="", place="";

function selectClimate(value,el){
  climate=value;
  animateAndNext(el,"step1","step2");
}

function selectOccasion(value,el){
  occasion=value;
  animateAndNext(el,"step2","step3");
}

function selectPlace(value,el){
  place=value;
  el.classList.add("selected");
  setTimeout(()=>{
    document.getElementById("step3").classList.add("hidden");
    showLoading();
  },600);
}

function animateAndNext(el,hide,show){
  el.classList.add("selected");
  setTimeout(()=>{
    document.getElementById(hide).classList.add("hidden");
    document.getElementById(show).classList.remove("hidden");
  },600);
}

function showLoading(){
  document.getElementById("loadingScreen").classList.remove("hidden");
  setTimeout(showOutfits,5000);
}

function showOutfits(){
  document.getElementById("loadingScreen").classList.add("hidden");
  const prefix = place + "-" + occasion;
  const gallery = document.getElementById("gallery");
  gallery.innerHTML="";

  for(let i=1;i<=10;i++){
    const num=i.toString().padStart(2,"0");
    const src=`${prefix}${num}.jpg`;

    const img=document.createElement("img");
    img.src=src;
    img.onerror=function(){this.style.display="none";}
    img.onclick=function(){openFullView(src);}
    gallery.appendChild(img);
  }
}

function openFullView(src){
  document.getElementById("fullImage").src=src;
  document.getElementById("fullView").style.display="flex";
}

function closeFullView(){
  document.getElementById("fullView").style.display="none";
}
</script>

</body>
  </html>
